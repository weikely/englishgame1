<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/englishgame1/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>马小跳的英语乐园</title>
    <script>
      var l = window.location;
      var repoName = 'englishgame1';
      var pathParts = l.pathname.split('/');
      var rootPath = '/' + repoName + '/';
      var routePath = pathParts.slice(2).join('/');
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + rootPath + '?/' + routePath + (l.search ? '~and~' + l.search.slice(1).replace(/&/g, '~and~') : '') + l.hash);
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
